  <title id="title-chapter-11-concept-3-zh">Diff Tracking 是证据</title>
  <desc id="desc-chapter-11-concept-3-zh">Diff Tracking 是证据的手绘白板图，展示基线内容、已提交 patch delta、重命名来源、精确 diff、失效状态之间的关系。</desc>
